name: Veri Güncelle

# Tetikleme dışarıdan cron-job.org ile (workflow_dispatch) gelir.
# GitHub'ın kendi zamanlayıcısı KALDIRILDI: güvenilmezdi ve cron-job.org ile
# aynı anda çalışıp push çakışması (race) üretiyordu.
on:
  workflow_dispatch:

permissions:
  contents: write

# Aynı anda yalnız BİR çalışma olsun; yenisi gelirse sıraya girer (çakışma önlenir).
concurrency:
  group: veri-guncelle
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: yfinance kur
        run: pip install yfinance

      - name: Veriyi çek (data.js üret)
        run: python fetch_data.py

      - name: Değişiklikleri commit'le ve push'la (çakışmaya dayanıklı)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js data.json history.js
          if git diff --staged --quiet; then
            echo "Değişiklik yok, commit atılmıyor."
            exit 0
          fi
          git commit -m "veri güncelle ($(TZ=Europe/Berlin date '+%Y-%m-%d %H:%M'))"
          # Uzaktaki main bu sırada ilerlemişse (başka çalışma ya da elle yükleme),
          # remote'u çekip (data dosyalarında BİZİMKİNİ koruyarak) yeniden dene.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "push tamam (deneme $i)"
              exit 0
            fi
            echo "push reddedildi; remote ile birleştirilip tekrar denenecek (deneme $i)..."
            git pull --rebase -X ours origin main || git rebase --abort
            sleep $((RANDOM % 4 + 3))
          done
          echo "push 5 denemede de başarısız oldu."
          exit 1
